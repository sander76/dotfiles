
set -g prefix C-a
set-option -g status-position top
set -g mouse on
set -g mode-keys vi
set-option set-clipboard on

# Extended keys: let Shift+Enter and other modified keys pass through to apps
set -as terminal-features ',*:extkeys'
set -g extended-keys on
set -g extended-keys-format csi-u


# navigate windows
bind-key -n C-Tab next-window
bind-key -n C-BTab previous-window
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind -T copy-mode-vi v send-keys -X begin-selection

# window title: show git repo root name, or current dir basename
set -g automatic-rename on
set -g automatic-rename-format '#(cd "#{pane_current_path}" && git rev-parse --show-toplevel 2>/dev/null | xargs basename 2>/dev/null || basename "#{pane_current_path}")'


# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-fpp'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'




# TokyoNight colors for Tmux

set -g mode-style "fg=#7aa2f7,bg=#3b4261"

set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#7aa2f7,bg=#16161e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left ""
set -g status-right "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#7aa2f7,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h #[fg=#7aa2f7,bg=#16161e,bold] #S "

setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#16161e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#16161e"
setw -g window-status-format "#[fg=#24283b,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#a9b1d6,bg=#24283b] #I #W #F #[fg=#24283b,bg=#16161e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I #W #F #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#e0af68]#[bg=#16161e]#[fg=#16161e]#[bg=#e0af68]"
set -g @prefix_highlight_output_suffix ""

run '~/.tmux/plugins/tpm/tpm'
