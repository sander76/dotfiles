
theme = "catppuccin_mocha"

[editor]
auto-format=true
true-color=true
cursorline=true

[editor.statusline]
right = [
  "diagnostics",
  "selections",
  "register",
  "position",
  "file-encoding",
  "version-control",
]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.inline-diagnostics]
cursor-line = "error"
other-lines = "disable"

